}

button{

  margin:6px 0;

  background:#374151;
  color:white;

}

.wrong{background:#ef4444!important;}
.showCorrect{background:#22c55e!important;border:2px solid #fff;}

.btn{

  border-radius:12px;
  border:none;
  color:white;

}

.backBtn{

  padding:6px 10px;

let quiz=[];
  let canClick = true;
let i=0,score=0,answer="",mode="easy";
let highScore = localStorage.getItem("highScore") || 0;

window.onload = function(){
  document.getElementById("homeHighScore").innerText = highScore;
};
function goBack(){
  document.getElementById("game").style.display="none";
  document.getElementById("lobby").style.display="block";
}
// ▶ start game
 function start(m){
  mode = m;

  if(m === "flag"){
    quiz = flag;
  } 
  else if(m === "easy"){
    quiz = easy;
  } 
  else {
    quiz = hard;
  }

  i = 0;
  score = 0;

  document.getElementById("lobby").style.display = "none";
  document.getElementById("game").style.display = "block";

  document.getElementById("highScore").innerText = highScore;

  showQ();
}

// ❓ question
function showQ(){
  let q = quiz[i];
  answer = q.a;

  let opts = [...q.o].sort(()=>Math.random()-0.5);

  // FLAG MODE
  if(mode === "flag"){
    document.getElementById("q").innerHTML =
      `<img src="${q.img}" style="width:100%;max-height:180px;border-radius:10px;margin-bottom:10px;">
       <div>❓ ${q.q}</div>`;
  }
  else{
    document.getElementById("q").innerText = "❓ " + q.q;
  }

  let html = "";
  opts.forEach(o=>{
    html += `<button data-opt="${o}" onclick="check(this)">${o}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

// ✔ check answer
function check(btn){
  let buttons = document.querySelectorAll("#options button");

  buttons.forEach(b => b.disabled = true);

  if(btn.textContent.replace("✅","").replace("❌","").trim() === answer){

    btn.classList.add("correct");
    btn.innerHTML = "✅ " + btn.innerText;

    score++;
    document.getElementById("ok").play();

    document.getElementById("q").innerHTML =
      "🎉 Correct Answer!";

  } else {

    btn.classList.add("wrong");
    btn.innerHTML = "❌ " + btn.innerText;

    document.getElementById("bad").play();

    document.getElementById("q").innerHTML =
      "😢 Wrong Answer";

    buttons.forEach(b=>{
      if(b.innerText === answer){
        b.classList.add("showCorrect");
      }
    });
  }

  document.getElementById("score").innerText = score;

  updateRank();

  setTimeout(() => {
    next();
  }, 1000);
}
  function updateRank(){
  let r="Bronze";

  if(score>=2) r="Silver";
  if(score>=4) r="Gold";
  if(score>=6) r="Platinum";
  if(score>=8) r="Diamond";
  if(score>=10) r="ACE";

  document.getElementById("rank").innerText = r;
}
// ➡ next
function next(){
  i++;

  if(i>=quiz.length){
    end();
  }else{
    showQ();
  }
}
