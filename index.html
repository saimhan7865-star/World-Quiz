<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Country capital Quiz</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  color:white;
  background:url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1400&q=80");
  background-size:cover;
  overflow:hidden;
}

.overlay{
  background:rgba(0,0,0,0.88);
  width:100vw;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:10px;
}

.card{
  width:100%;
  max-width:520px;
  height:95vh;
  background:#111827;
  border-radius:15px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 0 25px #22c55e;
}

/* TOP BAR */
#top{
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

.rank{color:gold;}

/* QUESTION */
#q{
  font-size:22px;
  margin:10px 0;
}

/* BUTTONS */
button{
  width:100%;
  padding:16px;
  margin:6px 0;
  border:none;
  border-radius:12px;
  background:#374151;
  color:white;
  font-size:17px;
  cursor:pointer;
}

.correct{background:#22c55e!important;}
.wrong{background:#ef4444!important;}
.showCorrect{background:#22c55e!important;border:2px solid #fff;}

.btn{
  background:#22c55e;
  padding:14px;
  border-radius:12px;
  border:none;
  color:white;
  font-size:17px;
}

/* BACK BUTTON */
.backBtn{
  position:fixed;
  top:5px;
  left:5px;
  width:auto;
  padding:6px 10px;
  background:#ef4444;
  border-radius:8px;
  font-size:12px;
  z-index:999;
}
.center{text-align:center;}
</style>
</head>

<body>

<!-- 🔊 SOUNDS -->
<audio id="ok" src="https://actions.google.com/sounds/v1/ui/click.ogg"></audio>
<audio id="bad" src="https://actions.google.com/sounds/v1/ui/beep_short.ogg"></audio>

<div class="overlay">

<!-- LOBBY -->
<div id="lobby" class="center">
  <h1>🎮 Country capital quiz</h1>
  <h3>Created by Saim 👑</h3>
<h2>🏆 High Score: <span id="homeHighScore">0</span></h2>
  <p>Select Mode</p>

  <button class="btn" onclick="start('easy')">EASY</button>
  <button class="btn" onclick="start('hard')">HARD</button>
</div>

<!-- GAME -->
<div id="game" style="display:none; width:100%;">

  <div class="card">


    <div id="top">
      <div>🏆 <span id="score">0</span></div>
      <div class="rank">🎖 <span id="rank">Bronze</span></div>
      <div>⭐ <span id="highScore">0</span></div>
    </div>

    <div id="q">Loading...</div>
    <div id="options"></div>

  </div>

</div>

</div>
<button class="backBtn" onclick="goBack()">⬅ Back</button>
<script>

// 🎮 DATA
const easy = [
{q:"Capital of Pakistan?",a:"Islamabad",o:["Karachi","Lahore","Islamabad","Quetta"]},
{q:"Capital of India?",a:"New Delhi",o:["Mumbai","Delhi","New Delhi","Kolkata"]},
{q:"Capital of France?",a:"Paris",o:["Rome","Berlin","Paris","Madrid"]},
{q:"Capital of UK?",a:"London",o:["London","Manchester","Liverpool","Birmingham"]},
{q:"Capital of Japan?",a:"Tokyo",o:["Seoul","Tokyo","Beijing","Bangkok"]},

{q:"Capital of USA?",a:"Washington D.C.",o:["New York","Los Angeles","Washington D.C.","Chicago"]},
{q:"Capital of China?",a:"Beijing",o:["Shanghai","Beijing","Hong Kong","Shenzhen"]},
{q:"Capital of Germany?",a:"Berlin",o:["Berlin","Munich","Hamburg","Frankfurt"]},
{q:"Capital of Italy?",a:"Rome",o:["Milan","Venice","Rome","Naples"]},
{q:"Capital of Spain?",a:"Madrid",o:["Barcelona","Madrid","Seville","Valencia"]},

{q:"Capital of Canada?",a:"Ottawa",o:["Toronto","Vancouver","Ottawa","Montreal"]},
{q:"Capital of Brazil?",a:"Brasilia",o:["Rio","Sao Paulo","Brasilia","Salvador"]},
{q:"Capital of Russia?",a:"Moscow",o:["Moscow","Saint Petersburg","Kazan","Sochi"]},
{q:"Capital of Turkey?",a:"Ankara",o:["Istanbul","Ankara","Izmir","Bursa"]},
{q:"Capital of Australia?",a:"Canberra",o:["Sydney","Melbourne","Canberra","Perth"]},

{q:"Capital of Saudi Arabia?",a:"Riyadh",o:["Jeddah","Makkah","Riyadh","Medina"]},
{q:"Capital of UAE?",a:"Abu Dhabi",o:["Dubai","Abu Dhabi","Sharjah","Ajman"]},
{q:"Capital of South Korea?",a:"Seoul",o:["Seoul","Busan","Incheon","Daegu"]},
{q:"Capital of Egypt?",a:"Cairo",o:["Cairo","Alexandria","Giza","Luxor"]},
{q:"Capital of South Africa?",a:"Pretoria",o:["Cape Town","Johannesburg","Pretoria","Durban"]}
];

const hard = [
{q:"Capital of Switzerland?",a:"Bern",o:["Zurich","Geneva","Bern","Basel"]},
{q:"Capital of Norway?",a:"Oslo",o:["Oslo","Bergen","Trondheim","Helsinki"]},
{q:"Capital of Finland?",a:"Helsinki",o:["Helsinki","Oslo","Stockholm","Reykjavik"]},
{q:"Capital of Iceland?",a:"Reykjavik",o:["Reykjavik","Oslo","Copenhagen","Dublin"]},
{q:"Capital of Netherlands?",a:"Amsterdam",o:["Rotterdam","The Hague","Amsterdam","Utrecht"]},

{q:"Capital of Belgium?",a:"Brussels",o:["Brussels","Antwerp","Ghent","Bruges"]},
{q:"Capital of Austria?",a:"Vienna",o:["Vienna","Zurich","Prague","Munich"]},
{q:"Capital of Czech Republic?",a:"Prague",o:["Prague","Vienna","Budapest","Warsaw"]},
{q:"Capital of Hungary?",a:"Budapest",o:["Budapest","Prague","Warsaw","Vienna"]},
{q:"Capital of Poland?",a:"Warsaw",o:["Warsaw","Krakow","Gdansk","Lodz"]},

{q:"Capital of Greece?",a:"Athens",o:["Athens","Crete","Thessaloniki","Rhodes"]},
{q:"Capital of Portugal?",a:"Lisbon",o:["Porto","Lisbon","Madrid","Seville"]},
{q:"Capital of Ukraine?",a:"Kyiv",o:["Kyiv","Lviv","Odessa","Kharkiv"]},
{q:"Capital of Kazakhstan?",a:"Astana",o:["Almaty","Astana","Tashkent","Bishkek"]},
{q:"Capital of Uzbekistan?",a:"Tashkent",o:["Samarkand","Tashkent","Bishkek","Dushanbe"]},

{q:"Capital of Vietnam?",a:"Hanoi",o:["Ho Chi Minh City","Hanoi","Da Nang","Hue"]},
{q:"Capital of Thailand?",a:"Bangkok",o:["Phuket","Chiang Mai","Bangkok","Pattaya"]},
{q:"Capital of Philippines?",a:"Manila",o:["Cebu","Davao","Manila","Quezon City"]},
{q:"Capital of Malaysia?",a:"Kuala Lumpur",o:["Penang","Kuala Lumpur","Johor","Ipoh"]},
{q:"Capital of Indonesia?",a:"Jakarta",o:["Jakarta","Bali","Bandung","Surabaya"]},

{q:"Capital of Argentina?",a:"Buenos Aires",o:["Buenos Aires","Cordoba","Rosario","Mendoza"]},
{q:"Capital of Chile?",a:"Santiago",o:["Santiago","Valparaiso","Lima","Cusco"]},
{q:"Capital of Peru?",a:"Lima",o:["Lima","Cusco","Arequipa","Quito"]},
{q:"Capital of Colombia?",a:"Bogota",o:["Bogota","Medellin","Cali","Cartagena"]},
{q:"Capital of Mexico?",a:"Mexico City",o:["Guadalajara","Cancun","Mexico City","Monterrey"]}
];

let quiz=[];
let i=0,score=0,answer="",mode="easy";
let highScore = localStorage.getItem("highScore") || 0;

window.onload = function(){
  document.getElementById("homeHighScore").innerText = highScore;
};
function goBack(){
  document.getElementById("game").style.display="none";
  document.getElementById("lobby").style.display="block";
}
// ▶ start game
function start(m){
  mode=m;
  quiz=(m==="easy")?easy:hard;

  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";
document.getElementById("highScore").innerText = highScore;
  showQ();
}

// ❓ question
function showQ(){
  let q=quiz[i];
  answer=q.a;

  let opts=q.o.sort(()=>Math.random()-0.5);

  document.getElementById("q").innerText="❓ "+q.q;

  let html="";
  opts.forEach(o=>{
    html+=`<button onclick="check(this)">${o}</button>`;
  });

  document.getElementById("options").innerHTML=html;
}

// ✔ check answer
function check(btn){
  let buttons=document.querySelectorAll("#options button");

  if(btn.innerText===answer){

    btn.classList.add("correct");
    btn.innerHTML="✅ "+btn.innerText;

    score++;

    document.getElementById("ok").play();

    document.getElementById("q").innerHTML =
    "🎉 Congratulations! Correct Answer";

  }else{

    btn.classList.add("wrong");
    btn.innerHTML="❌ "+btn.innerText;

    document.getElementById("bad").play();

    document.getElementById("q").innerHTML =
    "😢 Wrong Answer";

    if(navigator.vibrate){
      navigator.vibrate(300);
    }

    buttons.forEach(b=>{
      if(b.innerText===answer){
        b.classList.add("showCorrect");
      }
    });
  }

  document.getElementById("score").innerText=score;

  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
    document.getElementById("highScore").innerText = highScore;
    document.getElementById("homeHighScore").innerText = highScore;
  }

  updateRank();
  setTimeout(next,900);
}

// 🎖 rank system
function updateRank(){
  let r="Bronze";

  if(score>=2) r="Silver";
  if(score>=4) r="Gold";
  if(score>=6) r="Platinum";
  if(score>=8) r="Diamond";
  if(score>=10) r="ACE";

  document.getElementById("rank").innerText=r;
}

// ➡ next
function next(){
  i++;

  if(i>=quiz.length){
    end();
  }else{
    showQ();
  }
}

// ☠ end screen
function end(){
  document.getElementById("game").innerHTML=`
    <div class="center">
      <h1>☠ GAME OVER</h1>
      <h2>Score: ${score}</h2>
      <h3>Rank: ${document.getElementById("rank").innerText}</h3>
      <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
  `;
}
</script>

</body>
</html>
