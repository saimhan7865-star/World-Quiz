<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>World Battle Quiz Ultimate</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  color: white;
  text-align: center;

  /* 🌍 Background Image */
  background: url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1400&q=80");
  background-size: cover;
  background-position: center;
  height: 100vh;
}

/* Dark overlay */
.overlay {
  background: rgba(0,0,0,0.75);
  height: 100vh;
  padding: 20px;
}

#lobby {
  padding-top: 80px;
}

.btn {
  padding: 15px 30px;
  font-size: 18px;
  background: #22c55e;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  color: white;
}

.card {
  background: rgba(17,24,39,0.95);
  max-width: 600px;
  margin: auto;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 0 20px #22c55e;
}

img {
  width: 130px;
  margin: 10px;
  border: 2px solid white;
}

button.option {
  width: 100%;
  margin: 6px 0;
  padding: 12px;
  background: #374151;
  border: none;
  color: white;
  border-radius: 8px;
  cursor: pointer;
}

.correct { background: #22c55e !important; }
.wrong { background: #ef4444 !important; }

#topbar {
  display: flex;
  justify-content: space-around;
  font-size: 18px;
  margin-bottom: 10px;
}

#creator {
  margin-top: 10px;
  color: gold;
}

/* glow */
.glow {
  animation: glow 0.4s;
}
@keyframes glow {
  0% { box-shadow: 0 0 0px #22c55e; }
  50% { box-shadow: 0 0 30px #22c55e; }
  100% { box-shadow: 0 0 0px #22c55e; }
}
</style>
</head>

<body>

<!-- 🔊 SOUNDS -->
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="startSound" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<div class="overlay">

<!-- LOBBY -->
<div id="lobby">
  <h1>🎮 WORLD BATTLE QUIZ</h1>
  <h3>Created by Saim</h3>
  <button class="btn" onclick="startGame()">START MATCH</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

  <div id="topbar">
    <div>❤️ Lives: <span id="lives">3</span></div>
    <div>🏆 Score: <span id="score">0</span></div>
  </div>

  <div class="card" id="card">

    <div id="question">Loading...</div>
    <img id="flag" style="display:none;" />

    <div id="options"></div>

    <div id="creator">👑 Created by Saim</div>
  </div>

</div>

</div>

<script>
let countries = [];
let index = 0;
let score = 0;
let lives = 3;
let answer = "";

// 🌍 load API
async function loadData(){
  let res = await fetch("https://restcountries.com/v3.1/all");
  let data = await res.json();

  countries = data.map(c => ({
    name: c.name.common,
    capital: c.capital ? c.capital[0] : "N/A",
    flag: c.flags.png
  }));
}

// ▶ start
function startGame(){
  document.getElementById("lobby").style.display = "none";
  document.getElementById("game").style.display = "block";

  document.getElementById("startSound").play();

  loadData().then(()=>{
    countries = shuffle(countries);
    showQ();
  });
}

// 🔀 shuffle
function shuffle(a){
  return a.sort(()=>Math.random()-0.5);
}

// ❓ question
function showQ(){
  let c = countries[index];
  let type = Math.random() > 0.5 ? "capital" : "flag";

  let options = [];

  if(type === "capital"){
    document.getElementById("flag").style.display = "none";
    document.getElementById("question").innerText =
      "🏙 Capital of " + c.name;

    answer = c.capital;
    options.push(c.capital);

  } else {
    document.getElementById("flag").style.display = "block";
    document.getElementById("flag").src = c.flag;

    document.getElementById("question").innerText =
      "🏳 Which country is this flag?";

    answer = c.name;
    options.push(c.name);
  }

  while(options.length < 4){
    let r = countries[Math.floor(Math.random()*countries.length)].name;
    if(!options.includes(r)) options.push(r);
  }

  options = shuffle(options);

  let html = "";
  options.forEach(o=>{
    html += `<button class="option" onclick="check(this)">${o}</button>`;
  });

  document.getElementById("options").innerHTML = html;
}

// ✔ check
function check(btn){
  if(btn.innerText === answer){
    btn.classList.add("correct");
    score++;
    document.getElementById("correctSound").play();
    document.getElementById("card").classList.add("glow");
    setTimeout(()=>document.getElementById("card").classList.remove("glow"),400);
  } else {
    btn.classList.add("wrong");
    lives--;
    document.getElementById("wrongSound").play();
  }

  document.getElementById("score").innerText = score;
  document.getElementById("lives").innerText = lives;

  setTimeout(next, 600);
}

// ➡ next
function next(){
  index++;

  if(lives <= 0){
    gameOver();
  } else {
    showQ();
  }
}

// ☠ game over
function gameOver(){
  document.getElementById("game").innerHTML = `
    <h1>☠ GAME OVER</h1>
    <h2>Score: ${score}</h2>
    <h3>Created by Saim 👑</h3>
    <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
  `;
}
</script>

</body>
</html>
