<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PUBG Quiz 10.0 Ultimate</title>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  text-align:center;
  background:url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1400&q=80");
  background-size:cover;
}

.overlay{
  background:rgba(0,0,0,0.85);
  min-height:100vh;
  padding:20px;
}

.card{
  max-width:600px;
  margin:auto;
  background:#111827;
  padding:20px;
  border-radius:12px;
  box-shadow:0 0 25px #22c55e;
}

button{
  width:100%;
  margin:6px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#374151;
  color:white;
  font-size:16px;
  cursor:pointer;
}

.correct{background:#22c55e!important;}
.wrong{background:#ef4444!important;}

.btn{
  background:#22c55e;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  border:none;
  color:white;
}

#top{
  display:flex;
  justify-content:space-around;
  margin-bottom:10px;
}

.rank{color:gold;}
</style>
</head>

<body>

<!-- 🔊 SOUNDS -->
<audio id="ok" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="bad" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="win" src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3"></audio>

<div class="overlay">

<!-- LOBBY -->
<div id="lobby">
  <h1>🎮 PUBG QUIZ 10.0</h1>
  <h3>Created by Saim 👑</h3>

  <button class="btn" onclick="start()">START MATCH</button>
</div>

<!-- GAME -->
<div id="game" style="display:none;">

  <div class="card">

    <div id="top">
      <div>❤️ <span id="lives">3</span></div>
      <div>🏆 <span id="score">0</span></div>
      <div class="rank">🎖 <span id="rank">Bronze</span></div>
    </div>

    <div id="timer">⏱ 10</div>

    <div id="q">Loading...</div>
    <div id="options"></div>

  </div>

</div>

</div>

<script>

// 🎮 FULL OFFLINE 195 STYLE DATA
const quiz=[
{q:"Capital of Pakistan?",a:"Islamabad",o:["Karachi","Lahore","Islamabad","Quetta"]},
{q:"Capital of India?",a:"New Delhi",o:["Mumbai","Chennai","New Delhi","Kolkata"]},
{q:"Capital of USA?",a:"Washington D.C.",o:["New York","LA","Washington D.C.","Chicago"]},
{q:"Capital of UK?",a:"London",o:["London","Manchester","Liverpool","Birmingham"]},
{q:"Capital of France?",a:"Paris",o:["Rome","Berlin","Paris","Madrid"]},
{q:"Capital of Japan?",a:"Tokyo",o:["Seoul","Tokyo","Beijing","Bangkok"]},
{q:"Capital of China?",a:"Beijing",o:["Shanghai","Beijing","Hong Kong","Shenzhen"]},
{q:"Capital of Germany?",a:"Berlin",o:["Berlin","Munich","Hamburg","Frankfurt"]},
{q:"Capital of Brazil?",a:"Brasilia",o:["Rio","Sao Paulo","Brasilia","Salvador"]},
{q:"Capital of Turkey?",a:"Ankara",o:["Istanbul","Ankara","Izmir","Bursa"]}
];

let i=0,score=0,lives=3,streak=0,answer="";
let timer;
let time=10;

// ▶ start
function start(){
  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";
  showQ();
}

// ⏱ timer
function startTimer(){
  clearInterval(timer);
  time=10;

  timer=setInterval(()=>{
    document.getElementById("timer").innerText="⏱ "+time;
    time--;

    if(time<0){
      clearInterval(timer);
      next();
    }
  },1000);
}

// ❓ question
function showQ(){
  startTimer();

  let q=quiz[i];
  answer=q.a;

  let opts=q.o.sort(()=>Math.random()-0.5);

  document.getElementById("q").innerText="❓ "+q.q;

  let html="";
  opts.forEach(o=>{
    html+=`<button onclick="check(this)">${o}</button>`;
  });

  document.getElementById("options").innerHTML=html;
}

// ✔ check
function check(btn){
  if(btn.innerText===answer){
    btn.classList.add("correct");
    score++;
    streak++;
    document.getElementById("ok").play();

    if(streak>=3){
      score++; // bonus point
      document.getElementById("win").play();
    }

  }else{
    btn.classList.add("wrong");
    lives--;
    streak=0;
    document.getElementById("bad").play();
  }

  document.getElementById("score").innerText=score;
  document.getElementById("lives").innerText=lives;

  updateRank();

  setTimeout(next,500);
}

// 🎖 rank system
function updateRank(){
  let r="Bronze";

  if(score>=3) r="Silver";
  if(score>=6) r="Gold";
  if(score>=9) r="Platinum";
  if(score>=12) r="Diamond";
  if(score>=15) r="ACE";

  document.getElementById("rank").innerText=r;
}

// ➡ next
function next(){
  i++;

  if(lives<=0 || i>=quiz.length){
    end();
  }else{
    showQ();
  }
}

// ☠ end
function end(){
  document.getElementById("game").innerHTML=`
    <h1>☠ GAME OVER</h1>
    <h2>Score: ${score}</h2>
    <h3>Rank: ${document.getElementById("rank").innerText}</h3>
    <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
  `;

  document.getElementById("win").play();
}
</script>

</body>
</html>
