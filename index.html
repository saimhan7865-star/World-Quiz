<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG Quiz 11.0 Ultra</title>

<style>
*{box-sizing:border-box;}

body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1526778548025-fa2f459cd5c1?auto=format&fit=crop&w=1400&q=80");
  background-size:cover;
  color:white;
  overflow:hidden;
}

/* FULL SCREEN FIX */
.overlay{
  background:rgba(0,0,0,0.88);
  width:100vw;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:10px;
}

.card{
  width:100%;
  max-width:500px;
  height:95vh;
  background:#111827;
  border-radius:15px;
  padding:15px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  box-shadow:0 0 25px #22c55e;
}

/* TOP BAR */
#top{
  display:flex;
  justify-content:space-between;
  font-size:18px;
}

/* QUESTION */
#q{
  font-size:22px;
  margin:10px 0;
}

/* OPTIONS BIG FOR MOBILE */
button{
  width:100%;
  padding:18px;
  margin:8px 0;
  border:none;
  border-radius:12px;
  background:#374151;
  color:white;
  font-size:18px;
  cursor:pointer;
}

.correct{background:#22c55e!important;}
.wrong{background:#ef4444!important;}
.showCorrect{background:#22c55e!important; border:2px solid white;}

.btn{
  background:#22c55e;
  padding:15px;
  border-radius:12px;
  border:none;
  color:white;
  font-size:18px;
}

/* LOBBY CENTER */
.center{
  text-align:center;
}

.rank{color:gold;}
</style>
</head>

<body>

<!-- 🔊 SOUND -->
<audio id="ok" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="bad" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>

<div class="overlay">

<!-- LOBBY -->
<div id="lobby" class="center">
  <h1>🎮 PUBG QUIZ 11.0 ULTRA</h1>

  <p>Select Mode</p>

  <button class="btn" onclick="start('easy')">EASY</button>
  <button class="btn" onclick="start('hard')">HARD</button>

  <h4>Created by Saim 👑</h4>
</div>

<!-- GAME -->
<div id="game" style="display:none; width:100%;">

  <div class="card">

    <div id="top">
      <div>❤️ <span id="lives">3</span></div>
      <div>🏆 <span id="score">0</span></div>
      <div class="rank">🎖 <span id="rank">Bronze</span></div>
    </div>

    <div id="q">Loading...</div>
    <div id="options"></div>

  </div>

</div>

</div>

<script>

// 🎮 DATA
const easy=[
{q:"Capital of Pakistan?",a:"Islamabad",o:["Karachi","Lahore","Islamabad","Quetta"]},
{q:"Capital of France?",a:"Paris",o:["Rome","Paris","Berlin","Madrid"]},
{q:"Capital of Japan?",a:"Tokyo",o:["Tokyo","Seoul","Beijing","Bangkok"]}
];

const hard=[
{q:"Capital of Switzerland?",a:"Bern",o:["Zurich","Geneva","Bern","Basel"]},
{q:"Capital of Kazakhstan?",a:"Astana",o:["Almaty","Astana","Tashkent","Bishkek"]},
{q:"Capital of New Zealand?",a:"Wellington",o:["Auckland","Wellington","Sydney","Melbourne"]},
{q:"Capital of Norway?",a:"Oslo",o:["Oslo","Bergen","Stockholm","Helsinki"]}
];

let quiz=[];
let i=0,score=0,lives=3,answer="",mode="easy";

// ▶ start
function start(m){
  mode=m;
  quiz=(m==="easy")?easy:hard;

  document.getElementById("lobby").style.display="none";
  document.getElementById("game").style.display="block";

  showQ();
}

// ❓ question
function showQ(){
  let q=quiz[i];
  answer=q.a;

  let opts=q.o.sort(()=>Math.random()-0.5);

  document.getElementById("q").innerText="❓ "+q.q;

  let html="";
  opts.forEach(o=>{
    html+=`<button onclick="check(this)">${o}</button>`;
  });

  document.getElementById("options").innerHTML=html;
}

// ✔ check
function check(btn){
  let buttons=document.querySelectorAll("button");

  if(btn.innerText===answer){
    btn.classList.add("correct");
    document.getElementById("ok").play();
    score++;
  }else{
    btn.classList.add("wrong");
    document.getElementById("bad").play();
    lives--;

    // 📳 vibration
    if(navigator.vibrate){
      navigator.vibrate(300);
    }

    // ✅ show correct answer
    buttons.forEach(b=>{
      if(b.innerText===answer){
        b.classList.add("showCorrect");
      }
    });
  }

  document.getElementById("score").innerText=score;
  document.getElementById("lives").innerText=lives;

  updateRank();

  setTimeout(next,900);
}

// 🎖 rank
function updateRank(){
  let r="Bronze";

  if(score>=2) r="Silver";
  if(score>=4) r="Gold";
  if(score>=6) r="Platinum";
  if(score>=8) r="Diamond";
  if(score>=10) r="ACE";

  document.getElementById("rank").innerText=r;
}

// ➡ next
function next(){
  i++;

  if(lives<=0 || i>=quiz.length){
    end();
  }else{
    showQ();
  }
}

// ☠ end
function end(){
  document.getElementById("game").innerHTML=`
    <div class="center">
      <h1>☠ GAME OVER</h1>
      <h2>Score: ${score}</h2>
      <h3>Mode: ${mode.toUpperCase()}</h3>
      <h3>Rank: ${document.getElementById("rank").innerText}</h3>
      <button class="btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
  `;
}
</script>

</body>
</html>
